<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .admin-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .admin-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .admin-scroll::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <!-- Global Error Logging for Boot Diagnostics -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Fatal Catch:', msg, url, lineNo, columnNo, error);
            const root = document.getElementById('root');
            if (root && (!root.innerHTML || root.innerHTML === "")) {
                root.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #ef4444; font-family: sans-serif;">
                        <h2 style="font-weight: 900;">FATAL KERNEL ERROR</h2>
                        <p style="color: #64748b;">${msg}</p>
                        <div style="font-size: 10px; color: #94a3b8; margin-top: 10px;">${url}:${lineNo}</div>
                    </div>
                `;
            }
            return false;
        };
        window.onunhandledrejection = function(event) {
            console.error('Unhandled Promise Rejection:', event.reason);
        };
    </script>
    <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
